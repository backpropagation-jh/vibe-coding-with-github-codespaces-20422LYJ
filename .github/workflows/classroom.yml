name: Autograding Tests
'on':
- push
- repository_dispatch
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Check File Existence
      id: check-file-existence
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: Check File Existence
        setup-command: ''
        command: ls index.html style.css script.js
        timeout: 1
        max-score: 20
    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      env:
        CHECK-FILE-EXISTENCE_RESULTS: "${{steps.check-file-existence.outputs.result}}"
      with:
        runners: check-file-existence
